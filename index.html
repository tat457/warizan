<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わりざん配りゲーム</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#f0f8ff;
    margin:0;
}

h1{
    background:#4caf50;
    color:white;
    margin:0;
    padding:15px;
}

#question{
    font-size:24px;
    margin:15px;
    font-weight:bold;
}

#score,#stock,#modeArea{
    font-size:20px;
    margin:10px;
}

select{
    font-size:18px;
    padding:6px 12px;
    border-radius:8px;
}

button{
    font-size:18px;
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.apple1{
    background:#ff6666;
    color:white;
}

.apple10{
    background:#ff9900;
    color:white;
}

.action{
    background:#4caf50;
    color:white;
}

.reset{
    background:#607d8b;
    color:white;
}

#appleSource{
    margin:15px auto;
    width:120px;
    padding:10px;
    background:white;
    border:3px dashed #ff6666;
    border-radius:15px;
}

#appleImg{
    width:70px;
    cursor:grab;
    user-select:none;
}

#appleImg:active{
    cursor:grabbing;
}

.people{
    display:flex;
    flex-wrap:nowrap;
    justify-content:flex-start;
    gap:10px;
    padding:10px;
    overflow-x:auto;
}

.person{
    background:#fffdf5;
    border:3px solid #4caf50;
    border-radius:12px;
    width:115px;
    min-width:115px;
    min-height:145px;
    padding:8px;
}

.person.dragover{
    background:#e8f5e9;
    transform:scale(1.03);
}

.person h3{
    margin:4px;
    font-size:16px;
}

.basket{
    min-height:55px;
    margin:6px 0;
    border:2px dashed #bc8f5a;
    border-radius:10px;
    background:#fff8dc;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
}

.miniApple{
    width:22px;
    height:22px;
    object-fit:cover;
    border-radius:50%;
    margin:1px;
}

.count{
    font-size:22px;
    color:#d32f2f;
    font-weight:bold;
}

.result{
    font-size:26px;
    font-weight:bold;
    margin:15px;
}

.success{
    color:green;
}

.fail{
    color:red;
}
</style>
</head>

<body>

<h1>🍎 わりざん配りゲーム 🍎</h1>

<div id="modeArea">
問題タイプ：
<select id="questionMode" onchange="newQuestion()">
    <option value="normal">あまりなし</option>
    <option value="remainder">あまりあり</option>
</select>
</div>

<div id="question"></div>

<div id="score">
スコア：<span id="scoreValue">0</span>
</div>

<div id="stock">
残りのリンゴ：<span id="remaining"></span>
</div>

<div id="appleSource">
<img
    id="appleImg"
    src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Red_Apple.jpg/120px-Red_Apple.jpg"
    alt="リンゴ"
    draggable="true"
>
<div>ドラッグして配る</div>
</div>

<div id="controls">
<button class="apple1" onclick="selectAmount(1)">🍎 1個</button>
<button class="apple10" onclick="selectAmount(10)">🍎×10</button>
</div>

<div class="people" id="people"></div>

<div>
<button class="action" onclick="judge()">判定</button>
<button class="action" onclick="newQuestion()">次の問題</button>
<button class="reset" onclick="resetGame()">やり直し</button>
</div>

<div id="result" class="result"></div>

<script>
let total=0;
let persons=0;
let answer=0;
let remainderAnswer=0;
let remaining=0;
let selectedAmount=1;
let boxes=[];
let score=0;

const appleImgUrl=
"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Red_Apple.jpg/120px-Red_Apple.jpg";

function selectAmount(n){
    selectedAmount=n;
}

document.getElementById("appleImg").addEventListener("dragstart",function(event){
    event.dataTransfer.setData("text/plain",String(selectedAmount));
});

function newQuestion(){
    const normalQuestions=[
        {a:12,b:3},{a:15,b:5},{a:24,b:6},{a:30,b:5},{a:40,b:8},
        {a:48,b:6},{a:60,b:5},{a:72,b:8},{a:90,b:9},{a:100,b:5}
    ];

    const remainderQuestions=[
        {a:13,b:3},{a:17,b:5},{a:25,b:6},{a:31,b:5},{a:43,b:8},
        {a:50,b:6},{a:62,b:5},{a:75,b:8},{a:92,b:9},{a:103,b:5}
    ];

    const mode=document.getElementById("questionMode").value;
    const questions=mode==="remainder" ? remainderQuestions : normalQuestions;
    const q=questions[Math.floor(Math.random()*questions.length)];

    total=q.a;
    persons=q.b;
    answer=Math.floor(total/persons);
    remainderAnswer=total%persons;
    remaining=total;
    boxes=[];

    for(let i=0;i<persons;i++){
        boxes.push(0);
    }

    if(mode==="remainder"){
        document.getElementById("question").textContent=
        `${total}個のリンゴを${persons}人で同じ数ずつ分けよう。あまりも考えよう`;
    }else{
        document.getElementById("question").textContent=
        `${total}個のリンゴを${persons}人で同じ数ずつ分けよう`;
    }

    drawPeople();
    clearResult();
}

function drawPeople(){
    document.getElementById("remaining").textContent=remaining;

    const area=document.getElementById("people");
    area.textContent="";

    boxes.forEach(function(value,index){
        const div=document.createElement("div");
        div.className="person";

        div.addEventListener("dragover",function(event){
            event.preventDefault();
            div.classList.add("dragover");
        });

        div.addEventListener("dragleave",function(){
            div.classList.remove("dragover");
        });

        div.addEventListener("drop",function(event){
            event.preventDefault();
            div.classList.remove("dragover");

            const amount=Number(event.dataTransfer.getData("text/plain"));
            give(index,amount);
        });

        const title=document.createElement("h3");
        title.textContent=`😀 人${index+1}`;

        const basket=document.createElement("div");
        basket.className="basket";

        const shownApples=Math.min(value,12);
        for(let i=0;i<shownApples;i++){
            const img=document.createElement("img");
            img.src=appleImgUrl;
            img.alt="";
            img.className="miniApple";
            basket.appendChild(img);
        }

        if(value>12){
            const more=document.createElement("span");
            more.textContent=`+${value-12}`;
            basket.appendChild(more);
        }

        const count=document.createElement("div");
        count.className="count";
        count.textContent=`${value}個`;

        const button=document.createElement("button");
        button.textContent="配る";
        button.onclick=function(){
            give(index,selectedAmount);
        };

        div.appendChild(title);
        div.appendChild(basket);
        div.appendChild(count);
        div.appendChild(button);

        area.appendChild(div);
    });
}

function give(index,amount){
    if(!Number.isInteger(amount) || amount<=0){
        return;
    }

    if(remaining<amount){
        showResult("⚠️ リンゴが足りません","fail");
        return;
    }

    boxes[index]+=amount;
    remaining-=amount;
    drawPeople();
}

function resetGame(){
    remaining=total;

    for(let i=0;i<boxes.length;i++){
        boxes[i]=0;
    }

    drawPeople();
    clearResult();
}

function judge(){
    const mode=document.getElementById("questionMode").value;
    const expectedRemaining=mode==="remainder" ? remainderAnswer : 0;

    if(remaining!==expectedRemaining){
        if(mode==="remainder"){
            showResult(`⚠️ あまりは ${remainderAnswer} 個になるようにしよう`,"fail");
        }else{
            showResult("⚠️ まだリンゴが残っています","fail");
        }
        return;
    }

    let ok=true;

    for(let i=0;i<boxes.length;i++){
        if(boxes[i]!==answer){
            ok=false;
            break;
        }
    }

    if(ok){
        score++;
        document.getElementById("scoreValue").textContent=score;

        if(mode==="remainder"){
            showResult(`🎉 正解！<br>${total} ÷ ${persons} = ${answer} あまり ${remainderAnswer}`,"success");
        }else{
            showResult(`🎉 正解！<br>${total} ÷ ${persons} = ${answer}`,"success");
        }
    }else{
        if(mode==="remainder"){
            showResult(`❌ ちがいます<br>みんな ${answer} 個ずつ、あまり ${remainderAnswer} 個になるよ`,"fail");
        }else{
            showResult(`❌ ちがいます<br>みんな ${answer} 個ずつになるよ`,"fail");
        }
    }
}

function showResult(message,type){
    const result=document.getElementById("result");
    result.innerHTML=message;
    result.className=`result ${type}`;
}

function clearResult(){
    const result=document.getElementById("result");
    result.textContent="";
    result.className="result";
}

newQuestion();
</script>

</body>
</html>
